<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarky.ca</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
            text-align: center;
            overflow: hidden; /* Prevents accidental scrollbars on mobile */
        }

        .banner {
            background-image: url('Scrolling-Text-Getsitecontrol.gif'); 
            background-repeat: no-repeat; 
            background-position: center; /* Keeps it centered in the 75% window */
            background-size: contain;    /* Scales the GIF so it fits the width */
            height: 142px; 
            width: 75%;
        }
    </style>
</head>
<body>
    <div class="banner"></div>
</body>
</html>
